name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configure git for rate limiting
      run: |
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 300
        git config --global http.postBuffer 524288000

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: buildozer-${{ runner.os }}-v5-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-v5-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git \
          libssl-dev libffi-dev python3-dev \
          openjdk-17-jdk unzip zip \
          libtool autoconf automake pkg-config
        pip3 install buildozer cython==0.29.36

    - name: Build APK with retry
      run: |
        for attempt in {1..3}; do
          echo "Build attempt $attempt"
          yes | buildozer android debug && break
          if [ $attempt -lt 3 ]; then
            echo "Waiting before retry..."
            sleep $((60 * attempt))
          fi
        done
      timeout-minutes: 120

    - name: Find APK
      run: find / -name "*.apk" 2>/dev/null || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug
        path: bin/*.apk
