name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git \
          libssl-dev libffi-dev python3-dev \
          openjdk-17-jdk unzip zip \
          libtool autoconf automake pkg-config
        pip3 install buildozer cython

    - name: Build APK
      run: yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug
        path: bin/*.apk
